  </div>

  <!-- NAV LINKS -->
  <nav class="nav-links">
    <a routerLink="/tutors" routerLinkActive="active">Find Tutor</a>
    <a (click)="goToHowItWorks()">How It Works</a>

    <!-- Show Become Tutor only if student -->
    <a *ngIf="role === 'student'" 
       routerLink="/become-tutor" 
       routerLinkActive="active">
       Become a Tutor
    </a>
  </nav>

  <!-- USER PROFILE -->
  <div class="profile" (click)="toggleMenu()">
    <div class="avatar">
      {{ userName.charAt(0) }}
    </div>
    <span class="name">{{ userName }}</span>

    <div class="dropdown" *ngIf="menuOpen">

      <!-- STUDENT MENU -->
      <a *ngIf="role === 'student'" routerLink="/student-dashboard">
        Dashboard
      </a>

      <a *ngIf="role === 'student'" routerLink="/student-sessions">
        My Sessions
      </a>

      <a *ngIf="role === 'student'" routerLink="/student-progress">
        My Progress
      </a>

      <!-- TUTOR MENU -->
      <a *ngIf="role === 'tutor'" routerLink="/tutor-dashboard">
        Tutor Dashboard
      </a>

      <hr />

      <button (click)="logout()">Sign Out</button>

    </div>
  </div>

</header>
