<div class="dashboard-container">

  <h2>Tutor Dashboard</h2>

  <div class="stats-grid">

    <div class="card">
      <h3>{{ stats.pending }}</h3>
      <p>Pending Requests</p>
    </div>

    <div class="card">
      <h3>{{ stats.upcoming }}</h3>
      <p>Upcoming Sessions</p>
    </div>

    <div class="card">
      <h3>{{ stats.completed }}</h3>
      <p>Completed Sessions</p>
    </div>

    <div class="card">
      <h3>{{ stats.students }}</h3>
      <p>Total Students</p>
    </div>

  </div>

</div>
